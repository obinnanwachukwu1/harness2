[suite]
id = "stability-6"
description = "Repeatability pack for question tracking and bounded evidence discipline"

[runtime]
reasoning_effort = "medium"
thinking = false
web_search_mode = "live"
repeat_count = 5

[clarification]
auto_reply = "Make the best grounded minimal choice and proceed. Keep the contract explicit."
mark_as_unnecessary = true

[[fixtures]]
id = "node-minimal"
type = "template"
path = "./fixtures/node-minimal"

[[fixtures]]
id = "next-app-router"
type = "template"
path = "./fixtures/next-app-router"
setup_command = "npm ci"

[[cases]]
id = "A1"
bucket = "A"
fixture = "next-app-router"
profile = "frontend/full-stack"
question_expected = false
experiment_expected = "no"
web_search_expected = "no"
prompt = """
Replace the default page with a small product landing page: hero, 3-feature grid, FAQ accordion, and a contact form that posts to a local route and returns a mocked success message. No email delivery, no auth, no persistence. Keep it minimal and locally runnable.
"""

[[cases]]
id = "B4"
bucket = "B"
fixture = "next-app-router"
profile = "full-stack history contract"
question_expected = true
experiment_expected = "no"
web_search_expected = "no"
prompt = """
In this Next.js repo, build a tiny local prompt-runner. Users can create one prompt, run it against a short input list, edit the prompt later, and rerun. History should feel clear and safe if the prompt changed between runs. No auth, no sharing, no cancel. Keep it minimal and locally runnable.
"""

[[cases]]
id = "B5"
bucket = "B"
fixture = "next-app-router"
profile = "ai-like ui contract"
question_expected = true
experiment_expected = "no"
web_search_expected = "no"
prompt = """
In this Next.js repo, build a tiny single-user chatbot UI with mocked assistant responses only—no real AI call yet. Users can edit the system prompt in settings, start new chats, and restore an unsent draft after refresh. History should feel clear and safe if the system prompt changes after earlier conversations exist. Keep it minimal and locally runnable.
"""

[[cases.followups]]
after_turn = 1
prompt = """
Existing conversations should remain historical snapshots of the system prompt that created them. New chats should use the current system prompt.
"""

[[cases]]
id = "C1"
bucket = "C"
fixture = "next-app-router"
profile = "ai/full-stack"
question_expected = true
experiment_expected = "optional"
web_search_expected = "yes"
prompt = """
In this Next.js repo, build a minimal chatbot using the OpenAI-compatible settings in .env.local (OPENAI_API_KEY, OPENAI_BASE_URL, OPENAI_MODEL). Before you lock in the route and client transport, verify from current official docs and one bounded runtime check what streaming + stop contract this setup actually supports end to end. Then implement the smallest reliable version and make the contract explicit in the UI. Keep it minimal and locally runnable.
"""

[cases.env_override]
env_source = "~/.h2/eval-env/next-app-router-openai.env"
write_env_file = ".env.local"
write_env_example = ".env.local.example"

[[cases.followups]]
after_turn = 1
prompt = """
If hard stop is unreliable here, implement cooperative cancel and make the UI explicit about what may still finish.
"""

[[cases]]
id = "C2"
bucket = "C"
fixture = "node-minimal"
profile = "ai/runtime"
question_expected = true
experiment_expected = "yes"
web_search_expected = "optional"
prompt = """
In this Node repo, build a tiny local page that starts a streamed generation from the OpenAI-compatible settings in .env and lets the user press Stop. Before you lock in behavior, verify in this runtime whether aborting the in-flight request actually stops additional chunks and what partial text state remains. Then implement the smallest reliable contract and make it explicit in the UI. Keep it minimal and locally runnable.
"""

[cases.env_override]
env_source = "~/.h2/eval-env/node-minimal-openai.env"
write_env_file = ".env"
write_env_example = ".env.example"

[[cases.followups]]
after_turn = 1
prompt = """
If hard abort is unreliable here, implement cooperative cancel and make the UI explicit about what may still finish.
"""

[[cases]]
id = "C3"
bucket = "C"
fixture = "node-minimal"
profile = "backend/concurrency"
question_expected = true
experiment_expected = "yes"
web_search_expected = "no"
prompt = """
In this Node repo, build a tiny job queue with SQLite and 4 workers. Before you lock in the claim loop, verify whether a single atomic claim statement in this runtime is enough to prevent double-claiming under concurrency, or whether you need a stronger pattern. Keep it minimal and locally runnable.
"""

[[cases.followups]]
after_turn = 1
prompt = """
Do not rely on a version-specific SQLite quirk. Make the claim loop robust even if the simple atomic pattern changes later.
"""
