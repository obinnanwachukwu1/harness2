[suite]
id = "wide-15"
description = "Wide decision-boundary eval suite across frontend, backend, existing repo, and AI/runtime uncertainty"

[runtime]
reasoning_effort = "medium"
thinking = false
web_search_mode = "live"

[clarification]
auto_reply = "Make the best grounded minimal choice and proceed. Keep the contract explicit."
mark_as_unnecessary = true

[[fixtures]]
id = "node-minimal"
type = "template"
path = "./fixtures/node-minimal"

[[fixtures]]
id = "node-service-starter"
type = "template"
path = "./fixtures/node-service-starter"

[[fixtures]]
id = "next-app-router"
type = "template"
path = "./fixtures/next-app-router"
setup_command = "npm ci"

[[fixtures]]
id = "vite-react"
type = "template"
path = "./fixtures/vite-react"
setup_command = "npm ci"

[[fixtures]]
id = "run-harness2"
type = "git_checkout"
path = ".."
ref = "HEAD"
setup_command = "npm ci"

[[cases]]
id = "A1"
bucket = "A"
fixture = "vite-react"
profile = "frontend"
question_expected = false
experiment_expected = false
web_search_expected = "no"
prompt = """
In this Vite React repo, add a small Settings panel with three controls: theme (light/dark/system), density (comfortable/compact), and animations (on/off). Persist them locally in localStorage. No sync, no server calls, no multi-user behavior. Most recent local change wins. Keep it minimal and locally runnable.
"""

[[cases]]
id = "A2"
bucket = "A"
fixture = "next-app-router"
profile = "frontend/full-stack"
question_expected = false
experiment_expected = false
web_search_expected = "no"
prompt = """
Replace the default page with a small product landing page: hero, 3-feature grid, FAQ accordion, and a contact form that posts to a local route and returns a mocked success message. No email delivery, no auth, no persistence. Keep it minimal and locally runnable.
"""

[[cases]]
id = "A3"
bucket = "A"
fixture = "node-service-starter"
profile = "backend"
question_expected = false
experiment_expected = false
web_search_expected = "no"
prompt = """
Add GET /api/items/export.csv to this service. Export the current items as UTF-8 CSV with header id,name,status,createdAt, newest-first. Return 200 with the header row even if there are no items. Keep it minimal and locally runnable.
"""

[[cases]]
id = "A4"
bucket = "A"
fixture = "node-minimal"
profile = "backend/cli"
question_expected = false
experiment_expected = false
web_search_expected = "no"
prompt = """
In this Node repo, build a tiny CLI that reads newline-delimited JSON, filters records by exact status, and writes newline-delimited JSON. No streaming, no huge-file support, no config file, no retries, no background work. Keep it minimal.
"""

[[cases]]
id = "A5"
bucket = "A"
fixture = "run-harness2"
profile = "existing-app patch"
question_expected = false
experiment_expected = false
web_search_expected = "no"
prompt = """
Add a small badge next to the run history heading that shows the number of runs currently listed. Keep it minimal and locally runnable.
"""

[[cases]]
id = "B1"
bucket = "B"
fixture = "run-harness2"
profile = "existing-app contract"
question_expected = true
experiment_expected = false
web_search_expected = "no"
prompt = """
Can you add cancellation and replay to this app? I want people to be able to stop a run while it’s in progress, see exactly which comparisons finished and which didn’t, and then later continue without losing the work that already completed. One important detail is that if someone edits a prompt variant after stopping a run, the app shouldn’t quietly mix old results with the new prompt. It should feel clear and safe. Please keep it minimal and locally runnable.
"""

[[cases.followups]]
after_turn = 1
prompt = """
One refinement: I do want stop to abort already-claimed in-flight comparisons when that can be done safely. If that guarantee cannot be made safely, keep the safer contract explicit rather than pretending it is hard-stop.
"""

[[cases]]
id = "B2"
bucket = "B"
fixture = "vite-react"
profile = "frontend contract"
question_expected = true
experiment_expected = false
web_search_expected = "no"
prompt = """
In this Vite repo, build a tiny local writing app with autosave and draft recovery. It should feel predictable if someone refreshes, closes the tab, opens a second tab, or manually saves while an older autosave exists. Keep it minimal and locally runnable.
"""

[[cases.followups]]
after_turn = 1
prompt = """
Same-browser multi-tab coordination does matter now, but cross-device sync still doesn’t.
"""

[[cases]]
id = "B3"
bucket = "B"
fixture = "node-service-starter"
profile = "backend contract"
question_expected = true
experiment_expected = false
web_search_expected = "no"
prompt = """
In this backend service starter, add a tiny local upload queue API. Failed uploads should be retryable later, users can remove items, and restart should feel safe. Keep it minimal and locally runnable. Don’t silently do surprising things with retries or deleted items.
"""

[[cases]]
id = "B4"
bucket = "B"
fixture = "next-app-router"
profile = "full-stack history contract"
question_expected = true
experiment_expected = false
web_search_expected = "no"
prompt = """
In this Next.js repo, build a tiny local prompt-runner. Users can create one prompt, run it against a short input list, edit the prompt later, and rerun. History should feel clear and safe if the prompt changed between runs. No auth, no sharing, no cancel. Keep it minimal and locally runnable.
"""

[[cases]]
id = "B5"
bucket = "B"
fixture = "next-app-router"
profile = "ai-like ui contract"
question_expected = true
experiment_expected = false
web_search_expected = "no"
prompt = """
In this Next.js repo, build a tiny single-user chatbot UI with mocked assistant responses only—no real AI call yet. Users can edit the system prompt in settings, start new chats, and restore an unsent draft after refresh. History should feel clear and safe if the system prompt changes after earlier conversations exist. Keep it minimal and locally runnable.
"""

[[cases.followups]]
after_turn = 1
prompt = """
Existing conversations should remain historical snapshots of the system prompt that created them. New chats should use the current system prompt.
"""

[[cases]]
id = "C1"
bucket = "C"
fixture = "next-app-router"
profile = "ai/full-stack"
question_expected = true
experiment_expected = "optional"
web_search_expected = "yes"
prompt = """
In this Next.js repo, build a minimal chatbot using the OpenAI-compatible settings in .env.local (OPENAI_API_KEY, OPENAI_BASE_URL, OPENAI_MODEL). Before you lock in the route and client transport, verify from current official docs and one bounded runtime check what streaming + stop contract this setup actually supports end to end. Then implement the smallest reliable version and make the contract explicit in the UI. Keep it minimal and locally runnable.
"""

[cases.env_override]
env_source = "~/.h2/eval-env/next-app-router-openai.env"
write_env_file = ".env.local"
write_env_example = ".env.local.example"

[[cases.followups]]
after_turn = 1
prompt = """
If hard stop is unreliable here, implement cooperative cancel and make the UI explicit about what may still finish.
"""

[[cases]]
id = "C2"
bucket = "C"
fixture = "node-minimal"
profile = "ai/runtime"
question_expected = true
experiment_expected = true
web_search_expected = "optional"
prompt = """
In this Node repo, build a tiny local page that starts a streamed generation from the OpenAI-compatible settings in .env and lets the user press Stop. Before you lock in behavior, verify in this runtime whether aborting the in-flight request actually stops additional chunks and what partial text state remains. Then implement the smallest reliable contract and make it explicit in the UI. Keep it minimal and locally runnable.
"""

[cases.env_override]
env_source = "~/.h2/eval-env/node-minimal-openai.env"
write_env_file = ".env"
write_env_example = ".env.example"

[[cases.followups]]
after_turn = 1
prompt = """
If hard abort is unreliable here, implement cooperative cancel and make the UI explicit about what may still finish.
"""

[[cases]]
id = "C3"
bucket = "C"
fixture = "node-minimal"
profile = "backend/concurrency"
question_expected = true
experiment_expected = true
web_search_expected = "no"
prompt = """
In this Node repo, build a tiny job queue with SQLite and 4 workers. Before you lock in the claim loop, verify whether a single atomic claim statement in this runtime is enough to prevent double-claiming under concurrency, or whether you need a stronger pattern. Keep it minimal and locally runnable.
"""

[[cases.followups]]
after_turn = 1
prompt = """
Do not rely on a version-specific SQLite quirk. Make the claim loop robust even if the simple atomic pattern changes later.
"""

[[cases]]
id = "C4"
bucket = "C"
fixture = "node-minimal"
profile = "backend/durability"
question_expected = true
experiment_expected = "optional"
web_search_expected = "no"
prompt = """
In this Node repo, build a tiny file-backed job tracker that survives restart. Before you choose the persistence strategy, verify whether writing to a temp file and renaming it is sufficient to avoid torn reads in this runtime, or whether you need an append-only journal fallback. Keep it minimal and locally runnable.
"""

[[cases]]
id = "C5"
bucket = "C"
fixture = "node-minimal"
profile = "frontend/runtime"
question_expected = true
experiment_expected = "optional"
web_search_expected = "no"
prompt = """
Build a tiny live-preview tool that reloads when a source Markdown file changes. Before you choose the watcher strategy, verify whether fs.watch in this runtime is reliable enough for editor-style save behavior, or whether you need a debounce/polling fallback. Keep it minimal and locally runnable.
"""
